# Build and publish the hop-mesh-store-sqlite crate from one verified tag artifact.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.97.0
      - name: Verify version, test, and package
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME#v}" = "$(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[0].version')"
          cargo test --locked
          cargo package --locked
          mkdir "$RUNNER_TEMP/release"
          crates=(target/package/*.crate)
          test "${#crates[@]}" -eq 1
          cp "${crates[0]}" "$RUNNER_TEMP/release/"
          cp Cargo.lock "$RUNNER_TEMP/release/Cargo.lock"
          python3 .github/crates-publish.py metadata \
            --crate "$RUNNER_TEMP/release/$(basename "${crates[0]}")" \
            --output "$RUNNER_TEMP/release/crates-metadata.json"
          python3 .github/release-artifact.py create --directory "$RUNNER_TEMP/release"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release/*
          if-no-files-found: error

  publish:
    needs: build
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Mint canonical-source read token
        id: source-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HOP_SOURCE_APP_ID }}
          private-key: ${{ secrets.HOP_SOURCE_APP_PRIVATE_KEY }}
          owner: hopmesh
          repositories: monorepo
          permission-actions: read
          permission-checks: read
          permission-contents: read
      - name: Verify canonical source provenance
        id: provenance
        env:
          SOURCE_TOKEN: ${{ steps.source-token.outputs.token }}
        run: python3 .github/release-provenance.py --component hop-store-sqlite --github-output "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ github.sha }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release
      - name: Verify immutable crate artifact
        run: >-
          python3 .github/release-artifact.py verify --directory "$RUNNER_TEMP/release"
          --canonical-source-sha '${{ steps.provenance.outputs.source_sha }}'
      - name: Authenticate to crates.io after verification
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish verified crate payload
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: >-
          python3 .github/crates-publish.py publish
          --crate "$RUNNER_TEMP/release/"*.crate
          --metadata "$RUNNER_TEMP/release/crates-metadata.json"
